<!DOCTYPE html>
<!-- ds-button | Comp-tier tokens: --btn-bg, --btn-bg-hover, --btn-bg-active, --btn-bg-disabled, --btn-text, --btn-text-disabled, --btn-radius, --btn-shadow, --btn-shadow-focus, --btn-px, --btn-py, --btn-h, --btn-font, --btn-weight + variant aliases (--btn-secondary-*, --btn-ghost-*) + size aliases (--btn-px-sm/lg, --btn-py-sm/lg, --btn-font-sm/lg) | A11y: native <button>, aria-disabled, aria-busy for loading, :focus-visible halo >=3:1, hit area >=44px -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ds-button — Component Showcase</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    body {
      font-family: var(--btn-font);
      color: var(--page-text);
      background: var(--page-bg);
      padding: var(--page-px);
      line-height: var(--page-leading);
    }
    h1 { font-size: var(--page-h1-size); margin-bottom: var(--page-gap-xs); }
    h2 { font-size: var(--page-h2-size); margin-top: var(--page-gap-lg); border-bottom: 1px solid var(--page-border); padding-bottom: var(--page-gap-xs); }
    h3 { font-size: var(--page-h3-size); margin-top: var(--page-gap-md); color: var(--page-text-muted); font-weight: var(--btn-weight); }
    .row { display: flex; gap: var(--page-row-gap); flex-wrap: wrap; align-items: center; padding: var(--page-gap-xs) 0; }
    .desc { color: var(--page-text-muted); max-width: 60ch; }

    /* ============ ds-button base ============ */
    .ds-button {
      /* layout */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--btn-gap);
      min-height: var(--btn-h);
      padding: var(--btn-py) var(--btn-px);
      /* typography */
      font-family: var(--btn-font);
      font-size: var(--btn-font-size);
      line-height: var(--btn-leading);
      font-weight: var(--btn-weight);
      /* shape */
      border-radius: var(--btn-radius);
      border: var(--btn-border-width) solid transparent;
      box-shadow: var(--btn-shadow);
      cursor: pointer;
      user-select: none;
      transition: background-color var(--btn-transition) ease,
                  border-color var(--btn-transition) ease,
                  box-shadow var(--btn-transition) ease,
                  color var(--btn-transition) ease;
    }

    .ds-button:focus { outline: none; }
    .ds-button:focus-visible,
    .ds-button.is-focus {
      box-shadow: var(--btn-shadow-focus);
    }

    /* size modifiers */
    .ds-button--sm {
      min-height: var(--btn-h);
      padding: var(--btn-py-sm) var(--btn-px-sm);
      font-size: var(--btn-font-sm);
    }
    .ds-button--md {
      padding: var(--btn-py) var(--btn-px);
      font-size: var(--btn-font-size);
    }
    .ds-button--lg {
      padding: var(--btn-py-lg) var(--btn-px-lg);
      font-size: var(--btn-font-lg);
    }

    /* variant: primary */
    .ds-button--primary {
      background: var(--btn-bg);
      color: var(--btn-text);
      border-color: var(--btn-bg);
    }
    .ds-button--primary:hover,
    .ds-button--primary.is-hover {
      background: var(--btn-bg-hover);
      border-color: var(--btn-bg-hover);
    }
    .ds-button--primary:active,
    .ds-button--primary.is-active {
      background: var(--btn-bg-active);
      border-color: var(--btn-bg-active);
    }

    /* variant: secondary */
    .ds-button--secondary {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-text);
      border-color: var(--btn-secondary-border);
    }
    .ds-button--secondary:hover,
    .ds-button--secondary.is-hover {
      background: var(--btn-secondary-bg-hover);
      border-color: var(--btn-secondary-border-hover);
    }
    .ds-button--secondary:active,
    .ds-button--secondary.is-active {
      background: var(--btn-secondary-bg-active);
      border-color: var(--btn-secondary-border-active);
    }

    /* variant: ghost */
    .ds-button--ghost {
      background: var(--btn-ghost-bg);
      color: var(--btn-ghost-text);
      border-color: var(--btn-ghost-border);
    }
    .ds-button--ghost:hover,
    .ds-button--ghost.is-hover {
      background: var(--btn-ghost-bg-hover);
    }
    .ds-button--ghost:active,
    .ds-button--ghost.is-active {
      background: var(--btn-ghost-bg-active);
    }

    /* disabled */
    .ds-button:disabled,
    .ds-button.is-disabled {
      background: var(--btn-bg-disabled);
      color: var(--btn-text-disabled);
      border-color: var(--btn-bg-disabled);
      opacity: var(--btn-opacity-disabled);
      cursor: not-allowed;
      pointer-events: none;
    }

    /* loading */
    .ds-button.is-loading { cursor: progress; pointer-events: none; }
    .ds-button.is-loading .ds-button__label { opacity: var(--btn-opacity-loading); }
    .ds-button__spinner {
      width: 1em;
      height: 1em;
      border: var(--btn-spinner-width) solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: ds-spin var(--btn-spinner-duration) linear infinite;
      display: inline-block;
    }
    @keyframes ds-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>button</h1>
  <p class="desc">Primary action button. 3 variants × 3 sizes × 6 states. All sizes maintain ≥44px touch target. Focus halo meets ≥3:1 contrast.</p>

  <!-- Primary -->
  <h2>Variant: Primary</h2>
  <h3>Sizes (rest)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--primary ds-button--sm"><span class="ds-button__label">Small</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md"><span class="ds-button__label">Medium</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--lg"><span class="ds-button__label">Large</span></button>
  </div>
  <h3>States (md)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--primary ds-button--md"><span class="ds-button__label">Rest</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md is-hover"><span class="ds-button__label">Hover</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md is-active"><span class="ds-button__label">Active</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md is-focus"><span class="ds-button__label">Focus-visible</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md" disabled aria-disabled="true"><span class="ds-button__label">Disabled</span></button>
    <button type="button" class="ds-button ds-button--primary ds-button--md is-loading" aria-busy="true" aria-live="polite">
      <span class="ds-button__spinner" aria-hidden="true"></span>
      <span class="ds-button__label">Loading…</span>
    </button>
  </div>

  <!-- Secondary -->
  <h2>Variant: Secondary</h2>
  <h3>Sizes (rest)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--secondary ds-button--sm"><span class="ds-button__label">Small</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md"><span class="ds-button__label">Medium</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--lg"><span class="ds-button__label">Large</span></button>
  </div>
  <h3>States (md)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--secondary ds-button--md"><span class="ds-button__label">Rest</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md is-hover"><span class="ds-button__label">Hover</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md is-active"><span class="ds-button__label">Active</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md is-focus"><span class="ds-button__label">Focus-visible</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md" disabled aria-disabled="true"><span class="ds-button__label">Disabled</span></button>
    <button type="button" class="ds-button ds-button--secondary ds-button--md is-loading" aria-busy="true" aria-live="polite">
      <span class="ds-button__spinner" aria-hidden="true"></span>
      <span class="ds-button__label">Loading…</span>
    </button>
  </div>

  <!-- Ghost -->
  <h2>Variant: Ghost</h2>
  <h3>Sizes (rest)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--ghost ds-button--sm"><span class="ds-button__label">Small</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md"><span class="ds-button__label">Medium</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--lg"><span class="ds-button__label">Large</span></button>
  </div>
  <h3>States (md)</h3>
  <div class="row">
    <button type="button" class="ds-button ds-button--ghost ds-button--md"><span class="ds-button__label">Rest</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md is-hover"><span class="ds-button__label">Hover</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md is-active"><span class="ds-button__label">Active</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md is-focus"><span class="ds-button__label">Focus-visible</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md" disabled aria-disabled="true"><span class="ds-button__label">Disabled</span></button>
    <button type="button" class="ds-button ds-button--ghost ds-button--md is-loading" aria-busy="true" aria-live="polite">
      <span class="ds-button__spinner" aria-hidden="true"></span>
      <span class="ds-button__label">Loading…</span>
    </button>
  </div>
</body>
</html>
